<div class="app-shell flex flex-col">
  <a class="skip-link focus-ring" href="#main-content">Skip to content</a>
  <header class="app-header sticky top-0 z-20">
    <nav class="mx-auto flex max-w-7xl items-center justify-between gap-6 px-6 py-3 lg:px-8" aria-label="Main navigation">
      <a routerLink="/" class="focus-ring flex items-center gap-3 rounded-sm text-xl font-black text-slate-950">
        <span class="brand-mark" aria-hidden="true">V</span>
        <span class="tracking-normal">Vensight</span>
      </a>

      <div class="flex items-center gap-1.5">
        <a
          routerLink="/"
          routerLinkActive="nav-link-active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="nav-link focus-ring"
        >
          Home
        </a>
        <a
          routerLink="/companies"
          routerLinkActive="nav-link-active"
          class="nav-link focus-ring"
        >
          Companies
        </a>
        <a
          routerLink="/compare"
          routerLinkActive="nav-link-active"
          class="nav-link focus-ring"
        >
          Compare
        </a>
        <a
          routerLink="/dashboard"
          routerLinkActive="nav-link-active"
          class="nav-link focus-ring"
        >
          Dashboard
        </a>
      </div>
    </nav>
  </header>

  <main id="main-content" class="flex-1">
    <router-outlet />
  </main>

  <footer class="app-footer">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-6 py-8 text-sm sm:flex-row sm:items-center sm:justify-between lg:px-8">
      <p class="flex items-center gap-3 font-semibold">
        <span class="brand-mark" aria-hidden="true">V</span>
        Vensight
      </p>
      <div class="flex flex-wrap items-center gap-4 text-slate-300">
        <a routerLink="/data-sources" class="text-link focus-ring text-slate-300">Data sources</a>
        <a routerLink="/legal/privacy" class="text-link focus-ring text-slate-300">Privacy</a>
        <a routerLink="/legal/terms" class="text-link focus-ring text-slate-300">Terms</a>
      </div>
    </div>
  </footer>
</div>
