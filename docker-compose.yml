services:
  postgres:
    image: postgres:17-alpine
    container_name: vensight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vensight_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - vensight-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vensight_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: node:24-alpine
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vensight_db?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/vensight_db?schema=public
      SESSION_SECRET: docker-local-session-secret-change-me
      ALLOWED_ORIGINS: http://localhost:4000
      AI_PROVIDER: mock
    volumes:
      - .:/app
      - vensight-node-modules:/app/node_modules
    command: sh -c "npm ci && npm run prisma:generate && npm run prisma:migrate:deploy && npm run prisma:seed"
    restart: "no"

  app:
    build:
      context: .
    container_name: vensight-app
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vensight_db?schema=public
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/vensight_db?schema=public
      SESSION_SECRET: docker-local-session-secret-change-me
      ALLOWED_ORIGINS: http://localhost:4000
      AI_PROVIDER: mock
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5:7b
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  vensight-postgres-data:
  vensight-node-modules:
